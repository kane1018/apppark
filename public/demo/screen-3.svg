<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1853a"/>
      <stop offset="1" stop-color="#bb4a0a"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#g)"/>
  <!-- window chrome -->
  <rect x="0" y="0" width="640" height="40" fill="#000000" fill-opacity="0.22"/>
  <circle cx="24" cy="20" r="6" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="46" cy="20" r="6" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="68" cy="20" r="6" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="120" y="11" width="420" height="18" rx="9" fill="#ffffff" fill-opacity="0.18"/>
  <!-- skeleton content -->
  <rect x="40" y="80" width="240" height="22" rx="6" fill="#ffffff" fill-opacity="0.85"/>
  <rect x="40" y="116" width="560" height="12" rx="6" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="40" y="138" width="520" height="12" rx="6" fill="#ffffff" fill-opacity="0.25"/>
  <rect x="40" y="160" width="540" height="12" rx="6" fill="#ffffff" fill-opacity="0.2"/>
  <!-- center label -->
  <text x="320" y="250" font-size="44" font-weight="900" fill="#ffffff" text-anchor="middle">デモ画像</text>
  <text x="320" y="284" font-size="18" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">SAMPLE — 実際のサービス画面ではありません</text>
  <!-- DEMO tag -->
  <g transform="translate(40,300)">
    <rect x="0" y="0" width="86" height="28" rx="6" fill="#000000" fill-opacity="0.45"/>
    <text x="43" y="19" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">DEMO</text>
  </g>
</svg>
